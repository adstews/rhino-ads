<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<title>Page Not Found — Rhino Ads</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to Rhino Ads to explore our marketing services.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="rhino-logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#004466;
  --navy-dark:#001A45;
  --red:#e93f33;
  --red-hover:#d4342a;
  --teal:#42BFC1;
  --dark:#2E2E2E;
  --text:#333;
  --text-light:#666;
  --bg:#fff;
  --bg-off:#f5f6f5;
  --border:#ddd;
  --footer-bg:#1a1a2e;
  --max-w:1200px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--text);line-height:1.6;background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.container{max-width:var(--max-w);margin:0 auto;padding:0 32px}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--navy);box-shadow:0 2px 20px rgba(0,0,0,.15)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
.nav-logo{font-size:22px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:36px;height:36px}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.85);transition:color .2s}
.nav-links a:hover{color:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:6px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:none;cursor:pointer;transition:all .3s}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-hover);transform:translateY(-2px);box-shadow:0 4px 16px rgba(233,63,51,.3)}
.mobile-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px}
.mobile-toggle span{display:block;width:24px;height:2px;background:#fff;margin:5px 0;transition:all .3s}
.error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 32px 80px}
.error-code{font-size:clamp(100px,15vw,180px);font-weight:800;color:var(--navy);line-height:1;letter-spacing:-.04em;opacity:.15}
.error-title{font-size:clamp(28px,4vw,42px);font-weight:800;color:var(--navy-dark);margin-top:-20px;text-transform:uppercase;letter-spacing:-.01em}
.error-desc{font-size:17px;color:var(--text-light);max-width:480px;margin:16px auto 32px;line-height:1.7}
.error-links{display:flex;gap:24px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.error-links a{font-size:14px;font-weight:600;color:var(--teal);transition:color .2s}
.error-links a:hover{color:var(--navy)}
.footer-strip{background:var(--footer-bg);padding:24px 0;text-align:center;position:fixed;bottom:0;left:0;right:0}
.footer-strip p{font-size:13px;color:rgba(255,255,255,.4)}
.footer-strip a{color:rgba(255,255,255,.4);transition:color .2s;margin:0 10px}
.footer-strip a:hover{color:var(--teal)}
@media(max-width:768px){
  .container{padding:0 20px}
  .nav-links{display:none}
  .mobile-toggle{display:block}
  .error-links{flex-direction:column;gap:12px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" viewBox="0 0 36 36" fill="none" width="36" height="36">
          <rect width="36" height="36" rx="8" fill="var(--red)"/>
          <path d="M6 22.5c0-1 .4-1.8 1-2.3.3-.3.5-.7.5-1.2v-1.5c0-1.5.6-2.9 1.7-3.9l.8-.7c.5-.5.8-1.1.8-1.8v-.6c0-.8.5-1.5 1.2-1.8l2.5-1c.5-.2 1-.2 1.5 0l1.5.6c.8.3 1.7.5 2.5.5h2c1.7 0 3.2.7 4.3 1.8l1.2 1.2c.7.7 1 1.6 1 2.5v2.2c0 .8-.3 1.5-.8 2l-1.2 1.2v2.3c0 .8-.7 1.5-1.5 1.5h-1c-.8 0-1.5-.7-1.5-1.5V20h-1v2.5c0 .8-.7 1.5-1.5 1.5h-1c-.8 0-1.5-.7-1.5-1.5V20h-3.5l-2 2.8c-.3.4-.8.7-1.3.7H9.5c-.8 0-1.5-.3-2.2-.7-.8-.5-1.3-1.3-1.3-2.3zm5.5-7a1 1 0 100-2 1 1 0 000 2z" fill="#fff"/>
          <path d="M8.5 14l-2-3.5c-.2-.3 0-.7.4-.7h2.3c.3 0 .5.2.6.4l.7 2.3" fill="#fff" opacity=".9"/>
        </svg>
        Rhino Ads
      </a>
      <div class="nav-links">
        <a href="/services/advertising/">Services</a>
        <a href="/industries/roofing/">Industries</a>
        <a href="/">Home</a>
        <a href="/#contact" class="btn btn-red">Let's Talk</a>
      </div>
      <button class="mobile-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn btn-red">Back to Homepage</a>
    <div class="error-links">
      <a href="/services/advertising/">Advertising</a>
      <a href="/services/websites/">Web Design</a>
      <a href="/services/seo/">SEO</a>
      <a href="/services/branding/">Branding</a>
      <a href="/#contact">Contact Us</a>
    </div>
  </div>
</div>

<div class="footer-strip">
  <p>&copy; 2026 Rhino Ads. All rights reserved.
    <a href="/privacy/">Privacy Policy</a>
    <a href="/terms/">Terms of Service</a>
  </p>
</div>

</body>
</html>
